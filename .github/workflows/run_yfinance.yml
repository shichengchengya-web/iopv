name: Fetch QDII Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 1-5' # Beijing Mon-Fri 09:00

jobs:
  fetch-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install yfinance pandas pytz openpyxl

      - name: Run script
        run: python get_data.py

      - name: Upload log file
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fetch-log
          path: output/fetch_log.txt
          retention-days: 3

      - name: Push results
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          if ls output/*.csv 1> /dev/null 2>&1; then
            git add output/*.csv
            git commit -m "Auto-update QDII Data: $(date)" || true
            git pull --rebase origin main || true
            git push origin main || true
          else
            echo "No CSV files to commit"
          fi
